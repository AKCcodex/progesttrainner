server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Next.js static export → fall back to index.html for client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Allow long cache on hashed assets.
  location /_next/static {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}