name: learning-coach

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: coach
      POSTGRES_PASSWORD: coach
      POSTGRES_DB: coach
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coach -d coach"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    env_file: .env
    environment:
      # Force-resolve hostnames to docker network names so the same .env works locally.
      DATABASE_URL: postgresql+psycopg://coach:coach@postgres:5432/coach
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://coach:coach@postgres:5432/coach
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    command: ["python", "-m", "app.workers.rq_worker"]

  bot:
    build: ./bot
    env_file: .env
    environment:
      BACKEND_BASE_URL: http://backend:8000
      INTERNAL_BOT_TOKEN: ${INTERNAL_BOT_TOKEN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    depends_on:
      - backend
    ports:
      - "3000:3000"

  jenkins:
    image: jenkins/jenkins:lts-jdk17
    user: root
    environment:
      # Skip the setup wizard on first boot — we configure via Jenkinsfile + init scripts.
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      - JENKINS_OPTS=--httpPort=8080
    volumes:
      # Persist Jenkins home (plugins, jobs, credentials, build history).
      - jenkins_home:/var/jenkins_home
      # Mount the source tree so Jenkins can build from it.
      - ./:/workspace:ro
      # Bind the host docker socket so Jenkins can run `docker build` / `docker compose`.
      # The jenkins:lts image includes the docker CLI, so we don't need to mount the binary.
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8090:8080"   # Jenkins web UI (host 8090 → container 8080; system Jenkins already on 8080)
      - "50001:50000" # Jenkins agent JNLP port
    restart: unless-stopped

volumes:
  pgdata:
  jenkins_home: